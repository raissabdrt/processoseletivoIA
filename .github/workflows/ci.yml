name: Validacao Automatica do Desafio Edge AI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar treinamento do modelo
        run: python train_model.py

      - name: Verificar geracao do modelo h5
        run: |
          if [ ! -f model.h5 ]; then
            echo "Arquivo model.h5 nao encontrado."
            exit 1
          fi

      - name: Executar otimizacao do modelo
        run: python optimize_model.py

      - name: Verificar geracao do modelo tflite
        run: |
          if [ ! -f model.tflite ]; then
            echo "Arquivo model.tflite nao encontrado."
            exit 1
          fi

      - name: Finalizacao
        run: echo "Desafio executado com sucesso!"
